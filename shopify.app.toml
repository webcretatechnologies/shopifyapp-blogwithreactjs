# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "946c7f95fc6780b88559e90d45ad7f96"
name = "Blogger React"
application_url = "https://example.com"
embedded = true

[auth]
redirect_urls = [
  "https://example.com/api/auth/callback",
]

[access_scopes]
scopes = "read_content,write_content,read_products,write_products,read_customers,read_orders,read_themes,read_script_tags,write_script_tags"

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled", "app_subscriptions/update"]
  uri = "/api/webhooks"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
